<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=https://bestdayadvisors.com/">
    <title>Page Not Found | Best Day Advisors</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-dark: #3e3189;
            --brand-teal: #38bfa9;
        }
        body { 
            background-color: #f8fafc; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .error-container { 
            text-align: center; 
            max-width: 500px; 
            padding: 2rem;
        }
        .display-1 { 
            font-weight: 800; 
            color: var(--brand-dark); 
            font-size: 6rem;
            margin-bottom: 0;
        }
        .btn-primary { 
            background-color: var(--brand-dark); 
            border: none; 
            padding: 0.8rem 2rem; 
            font-weight: 600;
        }
        .btn-primary:hover { 
            background-color: var(--brand-teal); 
            color: var(--brand-dark); 
        }
        .redirect-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="mb-4">
            <a href="https://bestdayadvisors.com/">
                <img src="favicon.png" alt="Best Day Advisors" style="width: 80px; height: 80px;" onerror="this.style.display='none'">
            </a>
        </div>
        
        <h1 class="display-1">404</h1>
        <h2 class="fw-bold mb-3" style="color: var(--brand-dark)">Page Not Found</h2>
        <p class="text-muted mb-4">The link you followed may be broken, or the page has been moved. Let's get your operations back on track.</p>
        
        <a href="https://bestdayadvisors.com/" class="btn btn-primary shadow-sm">Return to Home</a>
        
        <p class="redirect-text">
            Forwarding you to the main site in <span id="countdown">5</span> seconds...
        </p>
    </div>

    <script>
        var seconds = 5;
        function countdown() {
            seconds--;
            document.getElementById("countdown").textContent = seconds;
            if (seconds <= 0) return;
            setTimeout(countdown, 1000);
        }
        countdown();
    </script>
</body>
</html>
