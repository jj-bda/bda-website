<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Best Day Advisors, LLC | Strategy & Leadership</title>

    <style>
        :root {
            /* Palette from Logo */
            --brand-dark: #3e3189;   /* Dark Blue/Purple */
            --brand-teal: #38bfa9;   /* Teal */
            --brand-yellow: #FFD700; /* Yellow */
            
            /* Section Backgrounds */
            --bg-header: #ffffff;    /* Clean White */
            --bg-main: #f1f5f9;      /* Sophisticated Cool Gray */
            --bg-footer: #1e1b4b;    /* Very Dark Blue for grounding */
            
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navigation & Header */
        .navbar {
            background-color: var(--bg-header);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
        }

        /* Buttons - Now using the Dark Blue */
        .btn-primary {
            background-color: var(--brand-dark);
            border-color: var(--brand-dark);
            color: #ffffff;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--brand-teal); /* Switches to teal on hover for "flair" */
            border-color: var(--brand-teal);
            color: var(--brand-dark);
            transform: translateY(-1px);
        }

        .hero-section {
            background-color: var(--bg-header);
            padding: 100px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Cards */
        .service-card {
            background-color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 2.5rem;
            height: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            color: var(--brand-dark);
            font-weight: 700;
            margin-bottom: 1.25rem;
            position: relative;
        }
